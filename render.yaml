services:
  - type: web
    name: portfolio-cms-headless
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: admin@portfolio.dev
      - key: ADMIN_PASSWORD
        sync: false
      - key: PREVIEW_TTL_MINUTES
        value: "30"
